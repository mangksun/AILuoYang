[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "ailuoyang-ai-svc"
version = "0.1.0"
description = "AI tourism assistant service for miniapp ticket booking"
requires-python = ">=3.10"
dependencies = [
    "fastapi>=0.111.0",
    "uvicorn[standard]>=0.30.0",
    "langchain-core>=0.2.0",
    "langchain-openai>=0.1.8",
    "httpx>=0.27.0",
    "pymysql>=1.1.0",
    "pydantic>=2.7.0",
]

[tool.ruff]
line-length = 120
